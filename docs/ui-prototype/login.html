<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - UniCoFinder</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 80px);
        }
        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 2.5rem;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        .auth-footer {
            margin-top: 1.5rem;
            text-align: center;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--primary-cyan);
            text-decoration: none;
            font-weight: 500;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>

    <div class="app-container">
        <nav class="navbar">
            <div class="navbar-brand">
                <a href="index.html" class="text-gradient">UniCoFinder</a>
            </div>
            <div class="navbar-nav">
                <a href="register.html" class="btn btn-outline" style="padding: 0.5rem 1.2rem;">Sign Up</a>
            </div>
        </nav>

        <main class="main-content auth-container">
            <div class="card auth-card">
                <div class="auth-header">
                    <h2>Welcome Back</h2>
                    <p class="text-secondary">Log in to your account</p>
                </div>

                <form data-simulate data-simulate-redirect="dashboard.html">
                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-control" placeholder="you@example.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" style="display: flex; justify-content: space-between;">
                            Password
                            <a href="#" style="color: var(--primary-cyan); text-decoration: none; font-size: 0.8rem;">Forgot?</a>
                        </label>
                        <input type="password" class="form-control" placeholder="••••••••" required>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block mt-2" style="padding: 1rem;">Log In</button>
                </form>

                <div class="auth-footer">
                    Don't have an account? <a href="register.html">Sign up</a>
                </div>
            </div>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
